<html lang="no">
<head>
<meta charset="UTF-8">

<title>VM 2026 – Tippeligaen</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');
:root {
  --bg:#0d0d0d; --surface:#161616; --surface2:#1f1f1f; --border:#2a2a2a;
  --accent:#e8383d; --gold:#f5a623; --green:#27ae60; --text:#e8e8e8;
  --muted:#666; --nrk:#003f8a; --tv2:#cc0000;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh}
header{background:linear-gradient(135deg,#0d0d0d 0%,#1a0608 50%,#0d0d0d 100%);border-bottom:2px solid var(--accent);padding:16px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
header h1{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:3px;line-height:1}
header h1 span{color:var(--accent)}
.header-right{margin-left:auto;text-align:right}
.last-updated{font-size:11px;color:var(--muted)}
.last-updated strong{color:var(--gold)}
nav{display:flex;gap:4px;background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;overflow-x:auto}
nav button{background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:12px 16px;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;transition:all .2s;letter-spacing:.5px;text-transform:uppercase}
nav button:hover{color:var(--text)}
nav button.active{color:var(--accent);border-bottom-color:var(--accent)}
main{padding:20px;max-width:1400px;margin:0 auto}
.tab-content{display:none}
.tab-content.active{display:block}
.loading-screen{text-align:center;padding:80px 20px;color:var(--muted)}
.loading-screen .spinner{font-size:3rem;animation:spin 1s linear infinite;display:block;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-screen{text-align:center;padding:60px 20px;color:var(--accent)}
/* Leaderboard */
.leaderboard{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:24px}
.leaderboard-header{background:linear-gradient(90deg,#1a0608,var(--surface));padding:14px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.leaderboard-header h2{font-family:'Bebas Neue';letter-spacing:2px;font-size:1.2rem}
.lb-row{display:grid;grid-template-columns:44px 1fr repeat(4,64px);align-items:center;padding:11px 20px;border-bottom:1px solid var(--border);transition:background .15s}
.lb-row:last-child{border-bottom:none}
.lb-row:hover{background:var(--surface2)}
.lb-row.rank-1{background:linear-gradient(90deg,rgba(245,166,35,.08),transparent)}
.lb-row.rank-2{background:linear-gradient(90deg,rgba(192,192,192,.06),transparent)}
.lb-row.rank-3{background:linear-gradient(90deg,rgba(205,127,50,.06),transparent)}
.rank-badge{font-family:'Bebas Neue';font-size:1.4rem;letter-spacing:1px}
.rank-1 .rank-badge{color:var(--gold)}.rank-2 .rank-badge{color:#c0c0c0}.rank-3 .rank-badge{color:#cd7f32}
.lb-name{font-weight:600;font-size:15px;display:flex;align-items:center;gap:8px}
.lb-pts{text-align:center;font-family:'Bebas Neue';font-size:1.5rem;color:var(--accent);letter-spacing:1px}
.lb-sub{text-align:center;color:var(--muted);font-size:12px}
/* Standings */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:24px}
.group-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.group-card-header{background:var(--surface2);padding:9px 14px;font-family:'Bebas Neue';letter-spacing:2px;font-size:.95rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.group-card-header span{color:var(--muted);font-size:11px;font-family:'DM Sans';letter-spacing:0}
.standing-hdr,.standing-row{display:grid;grid-template-columns:20px 1fr 28px 28px 28px 28px 28px 28px 36px;gap:2px;padding:7px 12px;font-size:12px}
.standing-hdr{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border)}
.standing-hdr div,.standing-row .snum,.standing-row .spts{text-align:center}
.standing-hdr div:nth-child(2),.standing-row .sname{text-align:left}
.standing-row{border-bottom:1px solid var(--border);transition:background .15s}
.standing-row:last-child{border-bottom:none}
.standing-row:hover{background:var(--surface2)}
.standing-row.q1{background:rgba(39,174,96,.08);border-left:3px solid var(--green);padding-left:9px}
.standing-row.q2{background:rgba(245,166,35,.06);border-left:3px solid var(--gold);padding-left:9px}
.standing-row .pos{color:var(--muted);font-size:11px}
.standing-row .sname{font-weight:500}
.standing-row .spts{font-weight:700}
/* Match table */
.section-title{font-family:'Bebas Neue';font-size:1rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin:24px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.match-table{width:100%;border-collapse:separate;border-spacing:0 3px;margin-bottom:8px}
.match-table th{text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);padding:6px 8px}
.match-table th.center{text-align:center}
.match-table tr.match-row{background:var(--surface);transition:background .15s}
.match-table tr.match-row:hover{background:var(--surface2)}
.match-table td{padding:9px 8px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);vertical-align:middle}
.match-table td:first-child{border-left:1px solid var(--border);border-radius:6px 0 0 6px}
.match-table td:last-child{border-right:1px solid var(--border);border-radius:0 6px 6px 0}
.score-cell{text-align:center;font-family:'Bebas Neue';font-size:1.1rem;letter-spacing:1px;min-width:36px;color:var(--green)}
.meta-cell{color:var(--muted);font-size:11px;white-space:nowrap}
.tv-badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.5px}
.tv-nrk{background:var(--nrk);color:white}.tv-tv2{background:var(--tv2);color:white}
.player-scores{display:flex;gap:4px;flex-wrap:wrap}
.pscore{font-size:11px;font-weight:600;padding:2px 7px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);white-space:nowrap;color:var(--muted)}
.pscore.pts-3{background:rgba(39,174,96,.15);border-color:var(--green);color:var(--green)}
.pscore.pts-1{background:rgba(245,166,35,.12);border-color:var(--gold);color:var(--gold)}
.pscore.pts-0{background:rgba(232,56,61,.1);border-color:#3a1a1a;color:#884}
/* Graph */
.graph-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:20px;overflow:hidden}
.graph-wrap h2{font-family:'Bebas Neue';letter-spacing:2px;font-size:1.2rem;margin-bottom:4px}
.graph-wrap p{color:var(--muted);font-size:12px;margin-bottom:16px}
.graph-svg-wrap{width:100%;overflow-x:auto}
.graph-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
.graph-legend-item{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500}
/* Refresh badge */
.refresh-badge{display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--muted);margin-bottom:20px}
.refresh-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@media(max-width:600px){
  header{padding:12px 16px}
  header h1{font-size:1.5rem}
  main{padding:12px}
  .lb-row{grid-template-columns:36px 1fr repeat(2,56px)}
  .lb-sub:nth-child(5),.lb-sub:nth-child(6){display:none}
}
</style>

// ── Core functions ─────────────────────────────────────────────────
function matchKey(home, away) { return home + '|' + away; }
function calcPoints(tip, actual) {
  if (!tip || !actual) return null;
  const [th, ta] = tip;
  const [ah, aa] = actual;
  if (th === ah && ta === aa) return 3;
  const tipRes   = th > ta ? 'H' : th < ta ? 'A' : 'D';
  const actRes   = ah > aa ? 'H' : ah < aa ? 'A' : 'D';
  return tipRes === actRes ? 1 : 0;
}
function getActual(home, away) {
  const k = matchKey(home, away);
  return actuals[k] || null;  // [hm, bm] or null
}
function playerTotalPoints(player) {
  let pts = 0;

  // Group stage
  GROUP_MATCHES.forEach(m => {
    const actual = getActual(m.home, m.away);
    const tip = player.tips[matchKey(m.home, m.away)];
    const p = calcPoints(tip, actual);
    if (p !== null) pts += p;
  });

  // KO: compare player's checked teams vs actual advancing teams
  const ko = player.koTips || {};
  KO_ROUNDS_CFG.forEach(({ key, pts: roundPts }) => {
    const actual = actuals.ko?.[key] || [];
    if (actual.length === 0) return;
    const picked = ko[key] || [];
    picked.forEach(team => {
      if (actual.map(t=>t.toLowerCase()).includes(team.toLowerCase())) {
        pts += roundPts;
      }
    });
  });

  return pts;
}
function computeGroupStandings(group, playerTips) {
  // playerTips = null for "actual" mode, or player.tips for prediction mode
  const teams = GROUPS[group];
  const matches = GROUP_MATCHES.filter(m => m.group === group);
  const stats = {};
  teams.forEach(t => stats[t] = {sp:0,w:0,d:0,l:0,gf:0,ga:0});

  matches.forEach(m => {
    let score;
    if (playerTips === null) {
      score = getActual(m.home, m.away);
    } else {
      score = playerTips[matchKey(m.home, m.away)] || null;
    }
    if (!score) return;
    const [hg, ag] = score;
    stats[m.home].sp++; stats[m.away].sp++;
    stats[m.home].gf += hg; stats[m.home].ga += ag;
    stats[m.away].gf += ag; stats[m.away].ga += hg;
    if (hg > ag) { stats[m.home].w++; stats[m.away].l++; }
    else if (ag > hg) { stats[m.away].w++; stats[m.home].l++; }
    else { stats[m.home].d++; stats[m.away].d++; }
  });

  return teams.map(t => ({
    name: t,
    sp: stats[t].sp,
    w: stats[t].w,
    d: stats[t].d,
    l: stats[t].l,
    gf: stats[t].gf,
    ga: stats[t].ga,
    gd: stats[t].gf - stats[t].ga,
    pts: stats[t].w * 3 + stats[t].d
  })).sort((a, b) =>
    b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.name.localeCompare(b.name)
  );
}
function getGroupRank(group, rank, playerTips) {
  const standing = computeGroupStandings(group, playerTips);
  // Only return team if all 6 matches are filled
  const matches = GROUP_MATCHES.filter(m => m.group === group);
  const filled = matches.filter(m => {
    const score = playerTips === null ? getActual(m.home, m.away) : playerTips[matchKey(m.home, m.away)];
    return score !== null;
  });
  if (filled.length < 6) return null;
  return standing[rank - 1]?.name || null;
}

    }
    const actual = getActual(m.home, m.away);
    const norCls = m.home === 'Norge' || m.away === 'Norge' ? 'norge-highlight' : '';
    html += `<tr class="match-row ${norCls}">
      <td class="match-num">${m.num}</td>
      <td class="team-name">${m.home}</td>
      <td class="score-cell score-actual">${actual ? actual[0] + ' – ' + actual[1] : '<span style="color:var(--muted)">–</span>'}</td>
      <td class="team-name">${m.away}</td>
      <td class="meta-cell" style="text-align:center">${m.date} ${m.time}</td>
      <td class="meta-cell" style="text-align:center"><span class="tv-badge ${m.tv==='NRK'?'tv-nrk':'tv-tv2'}">${m.tv}</span></td>
      <td><div class="player-scores">`;

    players.forEach(p => {
      const tip = p.tips[matchKey(m.home, m.away)];
      const pts = calcPoints(tip, actual);
      if (!tip) return;
      const ptsClass = pts === null ? 'no-actual' : pts === 3 ? 'pts-3' : pts === 1 ? 'pts-1' : 'pts-0';
      const ptsLabel = pts !== null ? ` (+${pts}p)` : '';
      html += `<span class="pscore ${ptsClass}" style="border-color:${p.color}20">
        <span style="width:7px;height:7px;border-radius:50%;background:${p.color};display:inline-block;margin-right:4px"></span>
        ${p.name.split(' ')[0]}: ${tip[0]}–${tip[1]}${ptsLabel}</span>`;
    });

    html += `</div></td></tr>`;
  });
  html += '</table>';

  container.innerHTML = html;
}
function renderGraph() {
  const container = document.getElementById('graph-container');
  if (players.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="emoji">📈</div><h3>Ingen spillere lastet</h3><p>Last inn tips-filer for å se poengutviklingen</p></div>';
    return;
  }

  // Build timeline: all matches sorted by date, only those with actual results
  // Use a sequential match order: group matches in order, then KO in order
  const timeline = []; // {label, home, away, matchNum}

  GROUP_MATCHES.forEach(m => {
    const actual = getActual(m.home, m.away);
    if (actual) timeline.push({
      label: `${m.date}\n${m.home} v ${m.away}`,
      short: `${m.home.substring(0,3).toUpperCase()}-${m.away.substring(0,3).toUpperCase()}`,
      home: m.home, away: m.away
    });
  });

  if (timeline.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="emoji">⏳</div><h3>Ingen resultater ennå</h3><p>Legg inn kampresultater for å se poengutviklingen</p></div>';
    return;
  }

  // Calculate cumulative points for each player at each point in timeline
  const series = players.map(p => {
    let cumPts = 0;
    const points = [0]; // start at 0 before any match
    timeline.forEach(t => {
      const actual = getActual(t.home, t.away);
      const tip = p.tips[matchKey(t.home, t.away)];
      const pts = calcPoints(tip, actual);
      if (pts !== null) cumPts += pts;
      points.push(cumPts);
    });
    return { player: p, points };
  });

  // SVG dimensions
  const W = Math.max(700, timeline.length * 28 + 120);
  const H = 340;
  const PAD = { top: 20, right: 100, bottom: 60, left: 52 };
  const gW = W - PAD.left - PAD.right;
  const gH = H - PAD.top - PAD.bottom;

  const maxPts = Math.max(...series.map(s => Math.max(...s.points)), 10);
  const steps  = timeline.length;

  function xPos(i) { return PAD.left + (i / steps) * gW; }
  function yPos(v) { return PAD.top + gH - (v / maxPts) * gH; }

  // Y-axis grid lines
  const yTicks = [];
  const yStep = maxPts <= 20 ? 5 : maxPts <= 50 ? 10 : 20;
  for (let v = 0; v <= maxPts; v += yStep) yTicks.push(v);

  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg"
    style="width:100%;min-width:${Math.min(W,600)}px;font-family:'DM Sans',sans-serif">
    <defs>
      <style>
        .axis { stroke: #2a2a2a; stroke-width: 1; }
        .grid { stroke: #1f1f1f; stroke-width: 1; stroke-dasharray: 4,4; }
        .tick-label { fill: #666; font-size: 11px; }
        .match-label { fill: #444; font-size: 9px; }
        .end-label { font-size: 11px; font-weight: 600; }
      </style>
    </defs>`;

  // Grid lines + Y labels
  yTicks.forEach(v => {
    const y = yPos(v);
    svg += `<line class="grid" x1="${PAD.left}" y1="${y}" x2="${W - PAD.right}" y2="${y}"/>`;
    svg += `<text class="tick-label" x="${PAD.left - 6}" y="${y + 4}" text-anchor="end">${v}</text>`;
  });

  // X axis
  svg += `<line class="axis" x1="${PAD.left}" y1="${yPos(0)}" x2="${W - PAD.right}" y2="${yPos(0)}"/>`;

  // X-axis match labels (every 3rd to avoid clutter)
  timeline.forEach((t, i) => {
    const x = xPos(i + 1);
    if ((i + 1) % Math.max(1, Math.floor(timeline.length / 20)) === 0 || timeline.length <= 20) {
      svg += `<text class="match-label" x="${x}" y="${H - PAD.bottom + 14}" text-anchor="middle"
        transform="rotate(-45, ${x}, ${H - PAD.bottom + 14})">${t.short}</text>`;
    }
    // Vertical tick
    svg += `<line class="axis" x1="${x}" y1="${yPos(0)}" x2="${x}" y2="${yPos(0) + 4}"/>`;
  });

  // Draw lines per player (bottom to top z-order, then endpoints)
  // First pass: all lines
  series.forEach(s => {
    const color = s.player.color;
    let d = `M ${xPos(0)} ${yPos(0)}`;
    s.points.forEach((v, i) => { d += ` L ${xPos(i)} ${yPos(v)}`; });
    svg += `<path d="${d}" stroke="${color}" stroke-width="2.5" fill="none" stroke-linejoin="round" opacity="0.9"/>`;
  });

  // Second pass: dots at each point
  series.forEach(s => {
    const color = s.player.color;
    s.points.forEach((v, i) => {
      if (i === 0) return; // skip start
      const x = xPos(i); const y = yPos(v);
      svg += `<circle cx="${x}" cy="${y}" r="3" fill="${color}" stroke="var(--bg)" stroke-width="1.5"/>`;
    });
  });

  // End labels (sorted by final score to avoid overlap)
  const finalSorted = [...series].sort((a, b) => {
    const aFinal = a.points[a.points.length - 1];
    const bFinal = b.points[b.points.length - 1];
    return bFinal - aFinal;
  });

  const endX = xPos(steps);
  let lastY = -99;
  finalSorted.forEach(s => {
    const finalPts = s.points[s.points.length - 1];
    let y = yPos(finalPts);
    if (y - lastY < 14) y = lastY + 14; // push down to avoid overlap
    lastY = y;
    svg += `<circle cx="${endX}" cy="${yPos(finalPts)}" r="4" fill="${s.player.color}"/>`;
    svg += `<text class="end-label" x="${endX + 10}" y="${y + 4}" fill="${s.player.color}">${s.player.name.split(' ')[0]}</text>`;
  });

  svg += '</svg>';

  // Legend
  let legend = '<div class="graph-legend">';
  series.forEach(s => {
    const final = s.points[s.points.length - 1];
    legend += `<div class="graph-legend-item">
      <div class="graph-legend-dot" style="background:${s.player.color}"></div>
      ${s.player.name} <span style="color:var(--muted);margin-left:2px">(${final}p)</span>
    </div>`;
  });
  legend += '</div>';

  container.innerHTML = `
    <div class="graph-wrap">
      <h2>📈 Poengutvikling</h2>
      <p>Kumulativt poengsum etter hvert kampresultat. Kun kamper med registrert resultat vises.</p>
      <div class="graph-svg-wrap">${svg}</div>
      ${legend}
    </div>`;
}

// ── Tab switching ──────────────────────────────────────────────────
function showTab(id, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  if (btn) btn.classList.add('active');
  if (id === 'standings') renderStandings();
  if (id === 'details')   renderDetails();
  if (id === 'dashboard') renderLeaderboard();
  if (id === 'graph')     renderGraph();
}

// ── Parse a player .xlsx (same layout as VM2026_MineTips.xlsx) ─────
function parseXlsx(buffer, filename) {
  const wb = XLSX.read(buffer, {type: 'array', cellFormula: false});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});

  let name = String(rows[1]?.[3] || '').trim();
  if (!name || name === '0') name = filename.replace(/\.xlsx?$/i,'');

  const tips   = {};
  const koTips = { r1:[], r2:[], r3:[], r4:[], r5:[] };

  // KO section: col H (index 7) = checkbox (1 = selected), col I (index 8) = team name
  // Row ranges are 0-based array indices (Excel row - 1)
  const KO = {
    r1: { start:104, end:135 },  // Excel 105-136 (32 teams)
    r2: { start:139, end:154 },  // Excel 140-155 (16 teams)
    r3: { start:158, end:165 },  // Excel 159-166 (8 teams)
    r4: { start:169, end:172 },  // Excel 170-173 (4 teams)
    r5: { start:176, end:177 },  // Excel 177-178 (2 teams)
  };

  for (let i = 0; i < rows.length; i++) {
    const row = rows[i];

    // Group stage: rows 7-100 (index 6-99)
    if (i >= 6 && i <= 99) {
      const grp  = String(row[1] || '');
      const home = String(row[2] || '').trim();
      const away = String(row[6] || '').trim();
      const hm   = row[3];
      const bm   = row[5];
      if (!home || !away || !grp.match(/^[A-L]$/)) continue;
      if (hm !== '' && hm !== null && bm !== '' && bm !== null) {
        tips[home + '|' + away] = [Number(hm), Number(bm)];
      }
      continue;
    }

    for (const [round, range] of Object.entries(KO)) {
      if (i >= range.start && i <= range.end) {
        const checked  = row[7];  // col H
        const teamName = String(row[8] || '').trim();  // col I
        if (Number(checked) === 1 && teamName) {
          koTips[round].push(teamName);
        }
        break;
      }
    }
  }

  return { name, tips, koTips };
}

// ── Load player bet sheets from GitHub repo ────────────────────────
async function loadPlayers() {
  const apiUrl = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/?ref=${GITHUB_BRANCH}`;
  const resp = await fetch(apiUrl);
  if (!resp.ok) throw new Error('GitHub API: HTTP ' + resp.status);
  const contents = await resp.json();

  const xlsxFiles = contents.filter(item =>
    item.type === 'file' && /\.xlsx$/i.test(item.name)
  );

  const loaded = await Promise.all(xlsxFiles.map(async (file, i) => {
    const url = `https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${GITHUB_BRANCH}/${encodeURIComponent(file.name)}`;
    const r = await fetch(url + '?t=' + Date.now());
    if (!r.ok) throw new Error(`Kunne ikke laste ${file.name}`);
    const buf = await r.arrayBuffer();
    const parsed = parseXlsx(buf, file.name);
    return {
      name:   parsed.name,
      color:  COLORS[i % COLORS.length],
      tips:   parsed.tips,
      koTips: parsed.koTips
    };
  }));

  return loaded;
}

// ── Fetch match results from TheSportsDB ───────────────────────────
function getMatchesToFetch() {
  const MONTHS = {jan:'01',feb:'02',mar:'03',apr:'04',mai:'05',jun:'06',
                   jul:'07',aug:'08',sep:'09',okt:'10',nov:'11',des:'12'};
  const today = new Date();
  return GROUP_MATCHES.filter(m => {
    const k = matchKey(m.home, m.away);
    if (actuals[k]) return false; // already cached
    const [day, monAbbr] = m.date.replace('.','').split(' ');
    const month = MONTHS[monAbbr.toLowerCase()];
    const iso = `2026-${month}-${day.padStart(2,'0')}`;
    return new Date(iso) <= today;
  });
}

async function loadResults() {
  const toFetch = getMatchesToFetch();
  if (toFetch.length === 0) return;

  const SPORTSDB_SEARCH = 'https://www.thesportsdb.com/api/v1/json/3/searchevents.php?e=';

  const results = await Promise.allSettled(
    toFetch.map(m => {
      const query = encodeURIComponent(
        `${toEnglish(m.home)}_vs_${toEnglish(m.away)}`.replace(/ /g, '_')
      );
      return fetch(SPORTSDB_SEARCH + query, { signal: AbortSignal.timeout(10000) })
        .then(r => r.ok ? r.json() : Promise.reject(new Error('HTTP '+r.status)))
        .then(data => ({ match: m, event: (data.event || [])[0] }));
    })
  );

  let changed = false;
  results.forEach(res => {
    if (res.status !== 'fulfilled') return;
    const { match: m, event: e } = res.value;
    if (!e || e.strStatus !== 'FT') return;
    const hg = Number(e.intHomeScore);
    const ag = Number(e.intAwayScore);
    if (isNaN(hg) || isNaN(ag)) return;
    actuals[matchKey(m.home, m.away)] = [hg, ag];
    changed = true;
  });

  if (changed) {
    localStorage.setItem(RESULTS_CACHE_KEY, JSON.stringify(actuals));
  }
}

// ── Main load pipeline ──────────────────────────────────────────────
async function loadData() {
  try {
    await Promise.all([
      loadPlayers().then(p => { players = p; }),
      loadResults()
    ]);

    const now = new Date().toLocaleString('no-NO', { dateStyle:'short', timeStyle:'short' });
    document.getElementById('last-updated').innerHTML =
      `Sist oppdatert: <strong>${now}</strong>`;
    document.getElementById('refresh-info').textContent =
      `${players.length} spillere · Oppdateres automatisk hvert 5. minutt`;

    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display     = 'block';
    document.getElementById('error-screen').style.display = 'none';

    renderLeaderboard();
    return true;
  } catch(err) {
    console.error('Load error:', err);
    document.getElementById('loading').style.display     = 'none';
    document.getElementById('app').style.display         = 'none';
    document.getElementById('error-screen').style.display= 'block';
    document.getElementById('error-msg').textContent     =
      'Kunne ikke laste data: ' + err.message;
    return false;
  }
}

// ── Auto-refresh ───────────────────────────────────────────────────
async function refresh() {
  await loadData();
  const active = document.querySelector('.tab-content.active')?.id?.replace('tab-','');
  if (active === 'standings') renderStandings();
  if (active === 'details')   renderDetails();
  if (active === 'graph')     renderGraph();
}

// ── Manual refresh button ──────────────────────────────────────────
async function manualRefresh() {
  const btn = document.getElementById('manual-refresh-btn');
  btn.disabled = true;
  btn.textContent = '⟳ Henter...';

  try {
    await loadPlayers().then(p => { players = p; });
    await loadResults();

    const now = new Date().toLocaleString('no-NO', { dateStyle:'short', timeStyle:'short' });
    document.getElementById('last-updated').innerHTML =
      `Sist oppdatert: <strong>${now}</strong>`;

    const active = document.querySelector('.tab-content.active')?.id?.replace('tab-','');
    if (active === 'dashboard') renderLeaderboard();
    if (active === 'standings') renderStandings();
    if (active === 'details')   renderDetails();
    if (active === 'graph')     renderGraph();

    btn.textContent = '✓ Oppdatert';
  } catch(err) {
    console.error('Manual refresh error:', err);
    btn.textContent = '✗ Feil, prøv igjen';
  } finally {
    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = '↓ Hent resultater';
    }, 2000);
  }
}

// ── Init ───────────────────────────────────────────────────────────
loadData();
setInterval(refresh, REFRESH_INTERVAL);

</script>
